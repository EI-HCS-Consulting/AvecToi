name: EAS Update (preview)

# Publie automatiquement une mise à jour OTA sur le channel "preview" à
# chaque push sur main (donc à chaque merge de PR) contenant du code app.
# Remplace l'étape manuelle "eas update --channel preview" — voir
# Handoff/handoff.md et CLAUDE.md pour l'historique de cette règle.
on:
  push:
    branches: [main]
    paths-ignore:
      - "Handoff/**"
      - "Documentation/**"
      - "**.md"
  # Permet de rejouer manuellement une publication (onglet Actions → Run
  # workflow) si un run automatique a échoué et que le channel "preview" est
  # resté figé sur un commit plus ancien que main.
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # .env / .env.local sont gitignorés (jamais committés) — recréés ici à
      # partir des secrets du repo pour que `expo export` (déclenché par
      # `eas update`) trouve les mêmes variables qu'en local.
      - name: Write env files
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_KEY=${{ secrets.VITE_SUPABASE_KEY }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      # Le message du commit passe par une variable d'env (pas une
      # interpolation ${{ }} directe dans le script) : un message multi-ligne
      # contenant des guillemets ("...", «...») casserait le quoting bash et
      # ferait planter `eas update` avec des arguments tronqués — vu en
      # pratique sur le merge de la PR #84 (channel preview resté figé).
      - name: Publish EAS Update (preview)
        env:
          # head_commit est absent sur un déclenchement manuel
          # (workflow_dispatch) — message de repli dans ce cas.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual OTA update (workflow_dispatch)' }}
        run: |
          FIRST_LINE="$(printf '%s' "$COMMIT_MESSAGE" | head -n1)"
          eas update --channel preview --message "$FIRST_LINE" --non-interactive
